appId: app.thehinterlandguide
name: observation_play_internal
tags:
  - play-internal
  - observation
---
- addMedia:
    - "../../assets/images/icon.png"
- launchApp:
    clearState: false
- tapOn:
    id: "tab-journal"
- extendedWaitUntil:
    visible:
      id: "field-journal-screen"
    timeout: 30000
- extendedWaitUntil:
    visible: "Your Field Journal is empty"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "tab-observe"
    timeout: 30000
- tapOn:
    id: "tab-observe"
- assertVisible:
    id: "observe-screen"
- tapOn:
    id: "observation-library-button"
- runFlow: "../partials/pick_first_android_image.yaml"
- extendedWaitUntil:
    visible:
      id: "observation-confirm-screen"
    timeout: 30000
- assertVisible:
    id: "observation-confirm-image"
- tapOn:
    id: "observation-confirm-button"
- extendedWaitUntil:
    visible:
      id: "observation-submit-screen"
    timeout: 30000
- tapOn:
    id: "observation-no-location-button"
- tapOn:
    id: "observation-unknown-button"
- tapOn:
    id: "observation-save-button"
- extendedWaitUntil:
    visible:
      id: "observation-stage-complete"
    timeout: 120000
- tapOn:
    id: "observation-done-button"
- extendedWaitUntil:
    visible:
      id: "field-journal-screen"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "field-journal-private-status"
    timeout: 30000
- assertVisible:
    id: "field-journal-observation-card"
- assertVisible: "This photo is private during the pilot."
- assertNotVisible:
    id: "field-journal-photo-image"
- tapOn:
    id: "field-journal-observation-card"
- extendedWaitUntil:
    visible:
      id: "observation-detail-screen"
    timeout: 30000
- assertVisible:
    id: "observation-detail-private-status"
- assertVisible: "This photo is private during the pilot."
- assertNotVisible:
    id: "observation-detail-photo-image"
- assertNotVisible:
    id: "observation-photo-helper-button"
- takeScreenshot: "w1-pilot-private-observation"
