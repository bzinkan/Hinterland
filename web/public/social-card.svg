      <path d="M17 29C-18-6-54 12-23 45c-31 7-24 39 7 22" fill="#eef8f5" stroke="#5e9fba" stroke-width="5"/>
      <path d="M29 29C64-6 100 12 69 45c31 7 24 39-7 22" fill="#eef8f5" stroke="#5e9fba" stroke-width="5"/>
