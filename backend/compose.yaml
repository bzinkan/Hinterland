name: hinterland-backend

services:
  postgres:
    image: postgres:16
    container_name: hinterland-postgres
    environment:
      POSTGRES_DB: hinterland
      POSTGRES_USER: hinterland
      POSTGRES_PASSWORD: hinterland
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hinterland -d hinterland"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hinterland-postgres:/var/lib/postgresql/data

volumes:
  hinterland-postgres:
