name: dragonfly-backend

services:
  postgres:
    image: postgres:16
    container_name: dragonfly-postgres
    environment:
      POSTGRES_DB: dragonfly
      POSTGRES_USER: dragonfly
      POSTGRES_PASSWORD: dragonfly
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragonfly -d dragonfly"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - dragonfly-postgres:/var/lib/postgresql/data

volumes:
  dragonfly-postgres:
