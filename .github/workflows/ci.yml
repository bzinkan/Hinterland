name: CI

# Runs on every PR and every push (any branch).
# - backend: ruff + mypy + pytest with coverage
# - observation-postgres: Alembic + real PostgreSQL concurrency/replay tests
# - mobile: TypeScript + Jest + Expo identity config sanity
#
# Azure deployment is handled by deploy-azure-api-dev.yml and the Static Web
# Apps workflows.

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  naming:
    name: Hinterland naming gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify current naming
        run: node scripts/check-hinterland-name.mjs

  backend:
    name: Backend lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: uv run mypy app

      - name: Test (pytest + coverage)
        working-directory: backend
        run: uv run pytest -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 14

  observation-postgres:
    name: Observation PostgreSQL 16 contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hinterland
          POSTGRES_PASSWORD: hinterland
          POSTGRES_DB: hinterland_observation_verify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hinterland -d hinterland_observation_verify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      HINTERLAND_DATABASE_HOST: 127.0.0.1
      HINTERLAND_DATABASE_PORT: "5432"
      HINTERLAND_DATABASE_NAME: hinterland_observation_verify
      HINTERLAND_DATABASE_USER: hinterland
      HINTERLAND_DATABASE_PASSWORD: hinterland
      OBSERVATION_TEST_DATABASE_URL: postgresql+asyncpg://hinterland:hinterland@127.0.0.1:5432/hinterland_observation_verify
      OBSERVATION_DISPATCHER_PROBE_RUNS: "50"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install locked backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Migrate disposable verification database
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Run real-PostgreSQL Observation contract
        working-directory: backend
        run: uv run pytest tests/integration/test_observation_postgres.py -q -s

  mobile:
    name: Mobile typecheck and config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (jest)
        run: npm test -- --ci

      - name: Verify mobile identities
        run: |
          APP_ENV=play-internal npm run config:play-internal
          npm run config:identities
