name: CI

# Runs on every PR and every push (any branch).
# - backend: ruff + mypy + pytest with coverage
# - mobile: TypeScript + play-internal Expo config sanity
#
# Note: the legacy AWS CDK diff job and GCP deploy path are inactive after
# ADR 0010. Azure deployment is handled by deploy-azure-api-dev.yml and the
# Static Web Apps workflows.

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: uv run mypy app

      - name: Test (pytest + coverage)
        working-directory: backend
        run: uv run pytest -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 14

  mobile:
    name: Mobile typecheck and config
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (jest)
        run: npm test -- --ci

      - name: Verify play-internal config
        run: APP_ENV=play-internal npm run config:play-internal
