name: Deploy parents web to Azure Static Web Apps (dev)

# Azure-only parents web deploy. Builds the Expo web bundle from mobile/ and
# ships it to Azure Static Web Apps site `hinterland-parents-swa`.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-parents-swa
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Static Web Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Require main for live parent deployment
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_SHA}" = "$(git rev-parse HEAD)"

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export --platform web

      - name: Verify exported parent web contract
        run: npm run config:parent-web -- --dist

      - name: Stamp exact parent build identity
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          target = Path("dist/.well-known/hinterland-build.json")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(
              json.dumps({"surface": "parents", "commit_sha": os.environ["GITHUB_SHA"]}),
              encoding="utf-8",
          )
          PY

      - name: Deploy to hinterland-parents-swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.HINTERLAND_PARENTS_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Output of `expo export --platform web` lives in mobile/dist.
          # The SWA action runs in a docker container with /github/workspace
          # mounted at repo root, so the path is resolved from there --
          # NOT from the workflow's working-directory.
          # `skip_app_build: true` short-circuits the Oryx build that
          # static-web-apps-deploy would otherwise attempt.
          app_location: "mobile/dist"
          output_location: ""
          skip_app_build: true

      - name: Verify exact parent callback route on both origins
        run: |
          set -euo pipefail
          for attempt in $(seq 1 18); do
            if python "${GITHUB_WORKSPACE}/scripts/verify_parent_callback.py" \
              --expected-sha "${GITHUB_SHA}" \
              --origin "azure_swa=https://purple-coast-088e6b30f.7.azurestaticapps.net" \
              --origin "public_parent=https://parents.thehinterlandguide.app" \
              --expected-html "${GITHUB_WORKSPACE}/mobile/dist/auth/callback.html" \
              --evidence-path "${GITHUB_WORKSPACE}/parent-callback-deploy-evidence.json"; then
              break
            fi
            if [[ "$attempt" = 18 ]]; then
              echo "Parent callback route did not converge to the deployed build" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Publish sanitized parent callback deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: parent-callback-deploy-${{ github.run_id }}
          path: parent-callback-deploy-evidence.json
          if-no-files-found: error
          retention-days: 30
