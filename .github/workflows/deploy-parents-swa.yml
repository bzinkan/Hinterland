name: Deploy parents web to Azure Static Web Apps (dev)

# Azure-only parents web deploy. Builds the Expo web bundle from mobile/ and
# ships it to Azure Static Web Apps site `hinterland-parents-swa`.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-parents-swa
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Static Web Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export --platform web

      - name: Stamp exact parent build identity
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          target = Path("dist/.well-known/hinterland-build.json")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(
              json.dumps({"surface": "parents", "commit_sha": os.environ["GITHUB_SHA"]}),
              encoding="utf-8",
          )
          PY

      - name: Deploy to hinterland-parents-swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.HINTERLAND_PARENTS_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Output of `expo export --platform web` lives in mobile/dist.
          # The SWA action runs in a docker container with /github/workspace
          # mounted at repo root, so the path is resolved from there --
          # NOT from the workflow's working-directory.
          # `skip_app_build: true` short-circuits the Oryx build that
          # static-web-apps-deploy would otherwise attempt.
          app_location: "mobile/dist"
          output_location: ""
          skip_app_build: true

      - name: Verify current parent resource and public domain
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from urllib.request import urlopen

          expected = os.environ["GITHUB_SHA"]
          targets = {
              "current Azure resource": "https://purple-coast-088e6b30f.7.azurestaticapps.net",
              "public parent domain": "https://parents.thehinterlandguide.app",
          }
          for label, base_url in targets.items():
              last_error = "no response"
              for _ in range(18):
                  try:
                      with urlopen(
                          f"{base_url}/.well-known/hinterland-build.json?sha={expected}",
                          timeout=15,
                      ) as response:
                          payload = json.load(response)
                      if payload == {"surface": "parents", "commit_sha": expected}:
                          break
                      last_error = f"unexpected marker: {payload!r}"
                  except Exception as exc:  # noqa: BLE001 - bounded deployment probe
                      last_error = str(exc)
                  time.sleep(5)
              else:
                  raise SystemExit(f"{label} did not serve the exact parent build: {last_error}")
          PY
