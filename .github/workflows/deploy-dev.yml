name: Deploy to dev (PAUSED — AWS path)

# PAUSED 2026-05-05 as part of the GCP migration (ADR 0005).
#
# Auto-trigger removed — this workflow no longer fires on push to main.
# It can still be invoked manually from the Actions tab via "Run workflow"
# if someone deliberately needs the AWS deploy path. The job content below
# is preserved as historical reference until a Cloud Run replacement
# workflow lands.
#
# Note: even before pausing, both jobs failed at install time —
# scripts/sync_expeditions.py and infra/pyproject.toml never existed in
# this repo. The pause just stops the noise on every push to main.
#
# Original behavior (kept for reference):
#   - sync-content: pushed expedition JSON to DynamoDB via OIDC AWS auth
#   - deploy: cdk deploy --all --require-approval never against dev account

on:
  workflow_dispatch:

# Only one deploy at a time; cancel stale runs if a new push comes in.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  sync-content:
    name: Sync expedition content
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: us-east-1

      - name: Sync expeditions to DynamoDB
        working-directory: backend
        env:
          DRAGONFLY_ENV: dev
        run: uv run python ../scripts/sync_expeditions.py

  deploy:
    name: CDK deploy (dev)
    runs-on: ubuntu-latest
    environment: dev
    needs: sync-content
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Install infra dependencies
        working-directory: infra
        run: uv sync

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: us-east-1

      - name: CDK deploy
        working-directory: infra
        env:
          DRAGONFLY_ENV: dev
        run: uv run cdk deploy --all --require-approval never
