name: Observation W1 promotion

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type PROMOTE_OBSERVATION_W1 after reviewing the W1 runbook
        required: true
        type: string

concurrency:
  group: observation-w1-promotion
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: hinterland-dev-rg
  AZURE_SUBSCRIPTION_ID_EXPECTED: 3ac5dfb0-91b7-47d3-8187-9dc8d6305e96
  AZURE_TENANT_ID_EXPECTED: 18dbd7fa-c411-49bc-82fc-9ccaa26e3404
  AZURE_ACR_NAME: hinterlandacrdev
  AZURE_CONTAINER_APP: hinterland-api-central
  AZURE_CONTAINER_APP_ENV: hinterland-cae-central-dev
  AZURE_ROLLBACK_CONTAINER_APP: hinterland-api
  AZURE_ROLLBACK_CONTAINER_APP_ENV: hinterland-cae-dev
  AZURE_API_LOCATION_EXPECTED: centralus
  AZURE_JOB_LOCATION_EXPECTED: eastus
  AZURE_STORAGE_ACCOUNT: hinterlandphotosdev
  AZURE_UAMI_NAME: hinterland-api-central-mi
  AZURE_ROLLBACK_UAMI_NAME: hinterland-api-mi
  IMAGE_REPOSITORY: hinterland-api
  ENTRA_API_AUDIENCE: 7dd9da3c-b7d6-45d4-955b-d7561c43f209
  ENTRA_CLIENT_APP_ID: 60504e4c-6b5f-4031-a80a-3e4bdfae29b2
  SERVICE_BUS_NAMESPACE: hinterland-sb-dev
  MODERATION_QUEUE: moderation-pending
  INAT_QUEUE: inat-submit
  HINTERLAND_KID_JWKS_PATH: /.well-known/hinterland-kid-jwks.json

jobs:
  promote:
    name: Strict server promotion and evidence
    runs-on: ubuntu-latest
    timeout-minutes: 150
    environment:
      name: w1-promotion
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Require main for protected W1 promotion
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${GITHUB_SHA}" = "$(git rev-parse HEAD)"

      - name: Initialize sanitized promotion evidence
        env:
          PROMOTION_CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "${PROMOTION_CONFIRMATION}" = "PROMOTE_OBSERVATION_W1"
          mkdir -p promotion-artifact
          jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            '{schema_version:1, generated_at:$generated_at, commit_sha:$commit_sha,
              workflow_run_id:$run_id, classification:"sanitized-operational-evidence",
              result:"running"}' > promotion-artifact/promotion.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Require a usable protected test-parent credential
        env:
          HINTERLAND_SMOKE_ENTRA_BEARER: ${{ secrets.HINTERLAND_SMOKE_ENTRA_BEARER }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import time

          token = os.environ.get("HINTERLAND_SMOKE_ENTRA_BEARER", "").strip()
          if not token:
              raise SystemExit("HINTERLAND_SMOKE_ENTRA_BEARER is required; authenticated checks never skip")
          try:
              payload = token.split(".", 2)[1]
              payload += "=" * (-len(payload) % 4)
              claims = json.loads(base64.urlsafe_b64decode(payload.encode("ascii")))
              expires_at = int(claims["exp"])
          except Exception as exc:
              raise SystemExit("test-parent credential is not a JWT with an exp claim") from exc
          expected_issuer = (
              "https://login.microsoftonline.com/"
              f"{os.environ['AZURE_TENANT_ID_EXPECTED']}/v2.0"
          )
          if claims.get("ver") != "2.0":
              raise SystemExit("test-parent credential is not an Entra v2 access token")
          if claims.get("iss") != expected_issuer or claims.get("tid") != os.environ["AZURE_TENANT_ID_EXPECTED"]:
              raise SystemExit("test-parent credential has the wrong tenant or issuer")
          if claims.get("aud") != os.environ["ENTRA_API_AUDIENCE"]:
              raise SystemExit("test-parent credential has the wrong API audience")
          if claims.get("azp") != os.environ["ENTRA_CLIENT_APP_ID"]:
              raise SystemExit("test-parent credential was not minted for the approved client")
          if not isinstance(claims.get("oid"), str) or not claims["oid"]:
              raise SystemExit("test-parent credential has no adult object identity")
          scopes = claims.get("scp", "")
          if not isinstance(scopes, str) or "user.access" not in scopes.split():
              raise SystemExit("test-parent credential is missing user.access")
          remaining = expires_at - int(time.time())
          if remaining < 1800:
              raise SystemExit(
                  f"test-parent credential has only {remaining}s remaining; at least 1800s is required"
              )
          print(f"test-parent credential lifetime accepted ({remaining}s remaining)")
          PY

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install locked backend development dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Verify the full Observation contract on disposable PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          source backend/.venv/bin/activate
          pwsh -NoProfile -File scripts/verify_observation_postgres.ps1 \
            -DispatcherSamples 50
          jq '.postgres_verification={result:"passed", dispatcher_samples:50,
                dispatcher_scenario:"real_handlers_mixed_unknown_catalog_active_expedition"}' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify the isolated Azure target and record baseline
        run: |
          set -euo pipefail
          test "${AZURE_RESOURCE_GROUP}" = "hinterland-dev-rg"
          test "${AZURE_RESOURCE_GROUP}" != "gordi-pilot-rg"
          test "$(az account show --query id --output tsv)" = "${AZURE_SUBSCRIPTION_ID_EXPECTED}"
          test "$(az account show --query tenantId --output tsv)" = "${AZURE_TENANT_ID_EXPECTED}"
          az group show --name "${AZURE_RESOURCE_GROUP}" --output none

          normalize_location() {
            tr '[:upper:]' '[:lower:]' | tr -d ' '
          }
          assert_app_placement() {
            local app="$1" expected_location="$2" expected_environment="$3"
            local app_json location environment
            app_json="$(az containerapp show --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            location="$(jq -r '.location // empty' <<<"$app_json" | normalize_location)"
            environment="$(jq -r '.properties.environmentId // empty' <<<"$app_json")"
            test "$location" = "$expected_location"
            test "${environment##*/}" = "$expected_environment"
          }
          assert_app_placement "${AZURE_CONTAINER_APP}" \
            "${AZURE_API_LOCATION_EXPECTED}" "${AZURE_CONTAINER_APP_ENV}"
          assert_app_placement "${AZURE_ROLLBACK_CONTAINER_APP}" \
            "${AZURE_JOB_LOCATION_EXPECTED}" "${AZURE_ROLLBACK_CONTAINER_APP_ENV}"

          mapfile -t placement_jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          test "${#placement_jobs[@]}" -gt 0
          for job in "${placement_jobs[@]}"; do
            job_json="$(az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            location="$(jq -r '.location // empty' <<<"$job_json" | normalize_location)"
            environment="$(jq -r '.properties.environmentId // empty' <<<"$job_json")"
            test "$location" = "${AZURE_JOB_LOCATION_EXPECTED}"
            test "${environment##*/}" = "${AZURE_ROLLBACK_CONTAINER_APP_ENV}"
          done

          BASELINE_IMAGE="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query 'properties.template.containers[0].image' --output tsv)"
          BASELINE_REVISION="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.latestReadyRevisionName --output tsv)"
          BASELINE_ROLLBACK_IMAGE="$(az containerapp show \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query 'properties.template.containers[0].image' --output tsv)"
          BASELINE_ROLLBACK_REVISION="$(az containerapp show \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.latestReadyRevisionName --output tsv)"
          JOB_COUNT="$(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "length([?starts_with(name, 'hinterland-')])" --output tsv)"
          jq \
            --arg subscription "${AZURE_SUBSCRIPTION_ID_EXPECTED}" \
            --arg resource_group "${AZURE_RESOURCE_GROUP}" \
            --arg baseline_image "${BASELINE_IMAGE}" \
            --arg baseline_revision "${BASELINE_REVISION}" \
            --arg baseline_rollback_image "${BASELINE_ROLLBACK_IMAGE}" \
            --arg baseline_rollback_revision "${BASELINE_ROLLBACK_REVISION}" \
            --argjson baseline_job_count "${JOB_COUNT}" \
            '.azure={subscription:$subscription, resource_group:$resource_group,
              baseline_image:$baseline_image, baseline_revision:$baseline_revision,
              baseline_rollback_image:$baseline_rollback_image,
              baseline_rollback_revision:$baseline_rollback_revision,
              api_location:"centralus", job_location:"eastus",
              baseline_job_count:$baseline_job_count}' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

      - name: Apply W1 deny-by-default runtime settings
        run: |
          set -euo pipefail

          remove_forbidden_runtime_variable() {
            local app="$1" variable="$2" count
            count="$(az containerapp show \
              --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "length(properties.template.containers[0].env[?name=='${variable}'])" \
              --output tsv)"
            if [[ "$count" != 0 ]]; then
              az containerapp update \
                --name "$app" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --remove-env-vars "$variable" \
                --output none
            fi
          }

          for app in "${AZURE_CONTAINER_APP}" "${AZURE_ROLLBACK_CONTAINER_APP}"; do
            remove_forbidden_runtime_variable "$app" HINTERLAND_INAT_OAUTH_TOKEN
            remove_forbidden_runtime_variable "$app" HINTERLAND_DEV_AUTH_TOKEN
            az containerapp update \
              --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --set-env-vars \
                HINTERLAND_MODERATION_PROVIDER=noop \
                HINTERLAND_INAT_CV_ENABLED=false \
                HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
                HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
                HINTERLAND_INAT_SUBMIT_ENABLED=false \
                HINTERLAND_ALLOW_STUB_AUTH=false \
                HINTERLAND_DEV_AUTH_ENABLED=false \
                HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
                HINTERLAND_GEOCODING_PROVIDER=noop \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
              --output none
          done

          mapfile -t jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for job in "${jobs[@]}"; do
            [[ -n "$job" ]] || continue
            token_count="$(az containerapp job show \
              --name "$job" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "length(properties.template.containers[0].env[?name=='HINTERLAND_INAT_OAUTH_TOKEN'])" \
              --output tsv)"
            if [[ "$token_count" != 0 ]]; then
              az containerapp job update \
                --name "$job" --resource-group "${AZURE_RESOURCE_GROUP}" \
                --remove-env-vars HINTERLAND_INAT_OAUTH_TOKEN --output none
            fi
            az containerapp job update \
              --name "$job" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --set-env-vars \
                HINTERLAND_MODERATION_PROVIDER=noop \
                HINTERLAND_INAT_CV_ENABLED=false \
                HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
                HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
                HINTERLAND_INAT_SUBMIT_ENABLED=false \
                HINTERLAND_ALLOW_STUB_AUTH=false \
                HINTERLAND_DEV_AUTH_ENABLED=false \
                HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
                HINTERLAND_GEOCODING_PROVIDER=noop \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
              --output none
          done

          mapfile -t forbidden_jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-') && (contains(name, 'inat') || contains(name, 'inaturalist'))].name" \
            --output tsv)
          for job in "${forbidden_jobs[@]}"; do
            [[ -n "$job" ]] || continue
            az containerapp job delete \
              --name "$job" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --yes --output none
          done
          remaining_forbidden="$(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "length([?starts_with(name, 'hinterland-') && (contains(name, 'inat') || contains(name, 'inaturalist'))])" \
            --output tsv)"
          test "$remaining_forbidden" = 0

      - name: Contain and reject direct BlobCreated moderation drift
        run: |
          set -euo pipefail
          storage_id="$(az storage account show \
            --name "${AZURE_STORAGE_ACCOUNT}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          drift=0
          mapfile -t topics < <(az eventgrid system-topic list \
            --query '[].[name,resourceGroup]' --output tsv)
          for topic_row in "${topics[@]}"; do
            [[ -n "$topic_row" ]] || continue
            IFS=$'\t' read -r topic topic_resource_group <<< "$topic_row"
            [[ -n "$topic" && -n "$topic_resource_group" ]] || continue
            source="$(az eventgrid system-topic show \
              --name "$topic" --resource-group "$topic_resource_group" \
              --query source --output tsv)"
            [[ "${source,,}" == "${storage_id,,}" ]] || continue
            subscriptions="$(az eventgrid system-topic event-subscription list \
              --system-topic-name "$topic" \
              --resource-group "$topic_resource_group" --output json)"
            mapfile -t dangerous < <(jq -r \
              --arg moderation "/queues/${MODERATION_QUEUE}" '
              .[]
              | select(
                  (((.filter.includedEventTypes // []) | length) == 0)
                  or ((.filter.includedEventTypes // []) | index("Microsoft.Storage.BlobCreated"))
                )
              | select(
                  ((.destination.resourceId // "") | ascii_downcase | contains($moderation))
                  or ((.filter.subjectBeginsWith // "") | ascii_downcase | contains("/blobs/pending/"))
                )
              | .name' <<< "$subscriptions")
            for subscription in "${dangerous[@]}"; do
              [[ -n "$subscription" ]] || continue
              drift=1
              az eventgrid system-topic event-subscription delete \
                --system-topic-name "$topic" \
                --resource-group "$topic_resource_group" \
                --name "$subscription" --yes --output none
            done
          done

          # Resource-scoped subscriptions can be created through an implicit
          # system topic. Querying the storage resource ID is the Azure-supported
          # exhaustive view and prevents an unnamed/implicit topic from escaping
          # the explicit system-topic inventory above.
          resource_subscriptions="$(az eventgrid event-subscription list \
            --source-resource-id "$storage_id" --output json)"
          mapfile -t resource_dangerous < <(jq -r '
            .[]
            | select(
                (((.filter.includedEventTypes // []) | length) == 0)
                or ((.filter.includedEventTypes // []) | index("Microsoft.Storage.BlobCreated"))
              )
            | select(
                ((.name // "") | ascii_downcase | contains("moderation"))
                or ((.destination // {}) | tostring | ascii_downcase | contains("moderation"))
                or ((.filter.subjectBeginsWith // "") | ascii_downcase | contains("/blobs/pending/"))
              )
            | .name' <<< "$resource_subscriptions")
          for subscription in "${resource_dangerous[@]}"; do
            [[ -n "$subscription" ]] || continue
            drift=1
            az eventgrid event-subscription delete \
              --source-resource-id "$storage_id" \
              --name "$subscription" \
              --output none
          done
          if [[ "$drift" == 1 ]]; then
            echo "::error::Direct BlobCreated moderation drift was contained. Review the drift, then rerun promotion."
            exit 1
          fi

      - name: Prove inert iNaturalist queue isolation
        run: |
          set -euo pipefail
          uami_principal="$(az identity show \
            --name "${AZURE_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query principalId --output tsv)"
          uami_id="$(az identity show \
            --name "${AZURE_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          rollback_uami_principal="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query principalId --output tsv)"
          rollback_uami_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          assert_only_runtime_identity() {
            local kind="$1" name="$2" expected_id="$3" identity
            if [[ "$kind" == app ]]; then
              identity="$(az containerapp show --name "$name" \
                --resource-group "${AZURE_RESOURCE_GROUP}" --query identity --output json)"
            else
              identity="$(az containerapp job show --name "$name" \
                --resource-group "${AZURE_RESOURCE_GROUP}" --query identity --output json)"
            fi
            jq -e --arg expected "${expected_id,,}" '
              .type == "UserAssigned"
              and ((.userAssignedIdentities // {}) | length == 1)
              and ([((.userAssignedIdentities // {}) | keys[]) | ascii_downcase]
                   | index($expected) != null)
            ' <<< "$identity" >/dev/null
          }
          assert_only_runtime_identity app "${AZURE_CONTAINER_APP}" "$uami_id"
          assert_only_runtime_identity app "${AZURE_ROLLBACK_CONTAINER_APP}" \
            "$rollback_uami_id"
          mapfile -t identity_jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for job in "${identity_jobs[@]}"; do
            [[ -n "$job" ]] || continue
            assert_only_runtime_identity job "$job" "$rollback_uami_id"
          done
          queue_id="/subscriptions/${AZURE_SUBSCRIPTION_ID_EXPECTED}/resourceGroups/${AZURE_RESOURCE_GROUP}/providers/Microsoft.ServiceBus/namespaces/${SERVICE_BUS_NAMESPACE}/queues/${INAT_QUEUE}"
          az servicebus queue show \
            --namespace-name "${SERVICE_BUS_NAMESPACE}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${INAT_QUEUE}" --output none
          for principal in "$uami_principal" "$rollback_uami_principal"; do
            for role in \
              "Azure Service Bus Data Sender" \
              "Azure Service Bus Data Receiver" \
              "Azure Service Bus Data Owner"; do
              count="$(az role assignment list \
                --assignee-object-id "$principal" \
                --scope "$queue_id" --include-inherited \
                --query "[?roleDefinitionName=='${role}'] | length(@)" \
                --output tsv)"
              test "$count" = 0
            done
          done

      - name: Build one immutable image
        run: |
          set -euo pipefail
          login_server="$(az acr show \
            --name "${AZURE_ACR_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query loginServer --output tsv)"
          az acr build \
            --registry "${AZURE_ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --file backend/Dockerfile .
          digest="$(az acr repository show \
            --name "${AZURE_ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --query digest --output tsv)"
          test -n "$digest"
          echo "IMAGE=${login_server}/${IMAGE_REPOSITORY}@${digest}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${digest}" >> "$GITHUB_ENV"

      - name: Install smoke and migration tooling
        working-directory: backend
        run: |
          uv sync --frozen --no-dev
          echo "${GITHUB_WORKSPACE}/backend/.venv/bin" >> "${GITHUB_PATH}"

      - name: Resolve the additive Alembic head
        run: |
          set -euo pipefail
          heads="$(cd backend && alembic heads | awk '{print $1}')"
          test "$(wc -w <<< "$heads")" = 1
          echo "ALEMBIC_HEAD=${heads}" >> "$GITHUB_ENV"

      - name: Require the complete W1 job inventory and database secret contract
        run: |
          set -euo pipefail
          required_jobs=(
            hinterland-moderation-job
            hinterland-rarity-refresh
            hinterland-sweep-stale-reviews
            hinterland-sync-expeditions
            hinterland-obs-preflight
            hinterland-migrate
            hinterland-taxa-catalog-ingest
            hinterland-state-rebuild
            hinterland-mod-outbox-relay
            hinterland-dispatcher-replay
            hinterland-obs-retention
            hinterland-obs-health
            hinterland-expedition-funnel
          )
          optional_jobs=(hinterland-photo-revocation-replay)
          mapfile -t actual_jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for required in "${required_jobs[@]}"; do
            printf '%s\n' "${actual_jobs[@]}" | grep -Fxq "$required"
          done
          for actual in "${actual_jobs[@]}"; do
            printf '%s\n' "${required_jobs[@]}" "${optional_jobs[@]}" | grep -Fxq "$actual" || {
              echo "Unexpected Hinterland job in promotion inventory: $actual" >&2
              exit 1
            }
          done

          for job in "${actual_jobs[@]}"; do
            [[ -n "$job" ]] || continue
            secret_names="$(az containerapp job secret list \
              --name "$job" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query '[].name' --output tsv)"
            grep -Fxq pg-password <<< "$secret_names"
            password_ref="$(az containerapp job show \
              --name "$job" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "properties.template.containers[0].env[?name=='HINTERLAND_DATABASE_PASSWORD'].secretRef | [0]" \
              --output tsv)"
            test "$password_ref" = pg-password
          done

          job_uami_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          job_uami_client_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query clientId --output tsv)"
          test -n "$job_uami_id"
          test -n "$job_uami_client_id"

          mapfile -t shared_env < <(
            az containerapp show \
              --name "${AZURE_CONTAINER_APP}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query 'properties.template.containers[0].env' --output json |
            jq -r '
              .[]
              | select(.name != "AZURE_CLIENT_ID")
              | select(.name != "HINTERLAND_APP_VERSION")
              | select(.name != "HINTERLAND_DEV_AUTH_ENABLED")
              | select(.name != "HINTERLAND_DEV_AUTH_TOKEN")
              | select(.name != "HINTERLAND_MODERATION_PROVIDER")
              | select(.name != "HINTERLAND_INAT_CV_ENABLED")
              | select(.name != "HINTERLAND_INAT_CV_DISCLOSURE_APPROVED")
              | select(.name != "HINTERLAND_INAT_CV_BENCHMARK_APPROVED")
              | select(.name != "HINTERLAND_INAT_SUBMIT_ENABLED")
              | select(.name != "HINTERLAND_ENTRA_API_AUDIENCE")
              | select(.name != "HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED")
              | select(.name != "HINTERLAND_DATABASE_PASSWORD")
              | select(.secretRef | not)
              | select(.value != null)
              | "\(.name)=\(.value)"
            '
          )
          test "${#shared_env[@]}" -gt 0

          # Only read-only preflight and migration receive the new image before
          # Alembic succeeds. Scheduled consumers remain on the old digest.
          for job in hinterland-obs-preflight hinterland-migrate; do
            az containerapp job update \
              --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE}" \
              --set-env-vars \
                "${shared_env[@]}" \
                AZURE_CLIENT_ID="${job_uami_client_id}" \
                HINTERLAND_APP_VERSION="${GITHUB_SHA}" \
                HINTERLAND_MODERATION_PROVIDER=noop \
                HINTERLAND_INAT_CV_ENABLED=false \
                HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
                HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
                HINTERLAND_INAT_SUBMIT_ENABLED=false \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
                HINTERLAND_DATABASE_PASSWORD=secretref:pg-password \
              --output none
            job_json="$(az containerapp job show \
              --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --output json)"
            jq -e \
              --arg expected_id "${job_uami_id,,}" \
              --arg expected_client "$job_uami_client_id" '
                .identity.type == "UserAssigned"
                and ((.identity.userAssignedIdentities // {}) | length == 1)
                and ([((.identity.userAssignedIdentities // {}) | keys[]) | ascii_downcase]
                  | index($expected_id) != null)
                and ([.properties.template.containers[0].env[]
                  | select(.name == "AZURE_CLIENT_ID") | .value]
                  == [$expected_client])
              ' <<< "$job_json" >/dev/null
          done


      - name: Run read-only preflight and additive migrations first
        run: |
          set -euo pipefail
          echo '[]' > promotion-artifact/job-executions.json

          run_job() {
            local job="$1" execution status=""
            execution="$(az containerapp job start \
              --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query name --output tsv)"
            for _ in $(seq 1 90); do
              status="$(az containerapp job execution show \
                --name "$job" \
                --job-execution-name "$execution" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query properties.status --output tsv)"
              case "$status" in
                Succeeded|Failed|Canceled) break ;;
              esac
              sleep 10
            done
            jq \
              --arg job "$job" --arg execution "$execution" --arg status "$status" \
              '. + [{job:$job, execution:$execution, status:$status}]' \
              promotion-artifact/job-executions.json > promotion-artifact/job-executions.tmp
            mv promotion-artifact/job-executions.tmp promotion-artifact/job-executions.json
            test "$status" = Succeeded
          }

          run_job hinterland-obs-preflight
          run_job hinterland-migrate

      - name: Pin every consumer and job only after migration success
        run: |
          set -euo pipefail
          mapfile -t actual_jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          job_uami_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          job_uami_client_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query clientId --output tsv)"
          test -n "$job_uami_id"
          test -n "$job_uami_client_id"
          mapfile -t shared_env < <(
            az containerapp show \
              --name "${AZURE_CONTAINER_APP}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query 'properties.template.containers[0].env' --output json |
            jq -r '
              .[]
              | select(.name != "AZURE_CLIENT_ID")
              | select(.name != "HINTERLAND_APP_VERSION")
              | select(.name != "HINTERLAND_DEV_AUTH_ENABLED")
              | select(.name != "HINTERLAND_DEV_AUTH_TOKEN")
              | select(.name != "HINTERLAND_MODERATION_PROVIDER")
              | select(.name != "HINTERLAND_INAT_CV_ENABLED")
              | select(.name != "HINTERLAND_INAT_CV_DISCLOSURE_APPROVED")
              | select(.name != "HINTERLAND_INAT_CV_BENCHMARK_APPROVED")
              | select(.name != "HINTERLAND_INAT_SUBMIT_ENABLED")
              | select(.name != "HINTERLAND_ENTRA_API_AUDIENCE")
              | select(.name != "HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED")
              | select(.name != "HINTERLAND_DATABASE_PASSWORD")
              | select(.secretRef | not)
              | select(.value != null)
              | "\(.name)=\(.value)"
            '
          )
          test "${#shared_env[@]}" -gt 0
          for job in "${actual_jobs[@]}"; do
            [[ -n "$job" ]] || continue
            az containerapp job update \
              --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE}" \
              --set-env-vars \
                "${shared_env[@]}" \
                AZURE_CLIENT_ID="${job_uami_client_id}" \
                HINTERLAND_APP_VERSION="${GITHUB_SHA}" \
                HINTERLAND_MODERATION_PROVIDER=noop \
                HINTERLAND_INAT_CV_ENABLED=false \
                HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
                HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
                HINTERLAND_INAT_SUBMIT_ENABLED=false \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
                HINTERLAND_DATABASE_PASSWORD=secretref:pg-password \
              --output none
            job_json="$(az containerapp job show \
              --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --output json)"
            jq -e \
              --arg expected_id "${job_uami_id,,}" \
              --arg expected_client "$job_uami_client_id" '
                .identity.type == "UserAssigned"
                and ((.identity.userAssignedIdentities // {}) | length == 1)
                and ([((.identity.userAssignedIdentities // {}) | keys[]) | ascii_downcase]
                  | index($expected_id) != null)
                and ([.properties.template.containers[0].env[]
                  | select(.name == "AZURE_CLIENT_ID") | .value]
                  == [$expected_client])
              ' <<< "$job_json" >/dev/null
          done
          az containerapp job update \
            --name hinterland-obs-health \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --set-env-vars HINTERLAND_OBSERVATION_HEALTH_FAIL_UNHEALTHY=true \
            --output none
          az containerapp job update \
            --name hinterland-state-rebuild \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --set-env-vars \
              HINTERLAND_DERIVED_REBUILD_STRICT_DRAIN=true \
              HINTERLAND_DERIVED_REBUILD_MAX_PASSES=20 \
            --output none

      - name: Run catalog, Expeditions, and strict drained rebuild
        run: |
          set -euo pipefail
          run_job() {
            local job="$1" execution status=""
            execution="$(az containerapp job start \
              --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query name --output tsv)"
            for _ in $(seq 1 90); do
              status="$(az containerapp job execution show \
                --name "$job" \
                --job-execution-name "$execution" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query properties.status --output tsv)"
              case "$status" in
                Succeeded) break ;;
                Failed|Canceled) break ;;
              esac
              sleep 10
            done
            jq \
              --arg job "$job" --arg execution "$execution" --arg status "$status" \
              '. + [{job:$job, execution:$execution, status:$status}]' \
              promotion-artifact/job-executions.json > promotion-artifact/job-executions.tmp
            mv promotion-artifact/job-executions.tmp promotion-artifact/job-executions.json
            test "$status" = Succeeded
          }

          run_job hinterland-taxa-catalog-ingest
          run_job hinterland-sync-expeditions
          run_job hinterland-state-rebuild

      - name: Verify exact W1 web deployments
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from urllib.request import urlopen

          expected = os.environ["GITHUB_SHA"]
          targets = [
              ("parents", "https://parents.thehinterlandguide.app"),
              ("landing", "https://thehinterlandguide.app"),
              ("landing", "https://www.thehinterlandguide.app"),
          ]
          for surface, base_url in targets:
              last_error = "no response"
              for _ in range(36):
                  try:
                      with urlopen(
                          f"{base_url}/.well-known/hinterland-build.json?sha={expected}",
                          timeout=15,
                      ) as response:
                          payload = json.load(response)
                      if payload == {"surface": surface, "commit_sha": expected}:
                          break
                      last_error = f"unexpected marker: {payload!r}"
                  except Exception as exc:  # noqa: BLE001 - bounded promotion probe
                      last_error = str(exc)
                  time.sleep(5)
              else:
                  raise SystemExit(
                      f"{base_url} does not match the promotion SHA: {last_error}"
                  )
          PY

      - name: Verify parent callback route before API rollout
        run: |
          set -euo pipefail
          python scripts/verify_parent_callback.py \
            --expected-sha "${GITHUB_SHA}" \
            --origin "azure_swa=https://purple-coast-088e6b30f.7.azurestaticapps.net" \
            --origin "public_parent=https://parents.thehinterlandguide.app" \
            --evidence-path promotion-artifact/parent-callback-initial.json

      - name: Deploy the API only after migrations and rebuild
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --set-env-vars \
              HINTERLAND_APP_VERSION="${GITHUB_SHA}" \
              HINTERLAND_MODERATION_PROVIDER=noop \
              HINTERLAND_INAT_CV_ENABLED=false \
              HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
              HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
              HINTERLAND_INAT_SUBMIT_ENABLED=false \
              HINTERLAND_ALLOW_STUB_AUTH=false \
              HINTERLAND_DEV_AUTH_ENABLED=false \
              HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
              HINTERLAND_GEOCODING_PROVIDER=noop \
              HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
              HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
            --output none

      - name: Require exact Central and East API revisions to be healthy and serving
        run: |
          set -euo pipefail

          # ``az containerapp update`` returns when Azure accepts the revision,
          # not when the new container is healthy or ingress has switched to it.
          # A 2xx health check alone can therefore still come from the previous
          # revision.  Do not let a promotion reach its authenticated canary
          # until the control plane and both ingress surfaces prove the exact
          # requested digest and application version are live.
          wait_for_exact_revision() {
            local app="$1" deadline=$((SECONDS + 600)) ready_revision=""
            local app_json latest_revision latest_ready_revision active_revision_mode
            local traffic_ok revision_json revision_image provisioning_state health_state
            local running_state app_version
            while (( SECONDS < deadline )); do
              app_json="$(az containerapp show \
                --name "$app" \
                --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
              latest_revision="$(jq -r '.properties.latestRevisionName // empty' <<<"$app_json")"
              latest_ready_revision="$(jq -r '.properties.latestReadyRevisionName // empty' <<<"$app_json")"
              active_revision_mode="$(jq -r '.properties.configuration.activeRevisionsMode // empty' <<<"$app_json")"
              traffic_ok="$(jq -r '
                if .properties.configuration.ingress.traffic
                   | any(.latestRevision == true and .weight == 100)
                then "true" else "false" end
              ' <<<"$app_json")"

              if [[ -n "$latest_revision" && "$latest_revision" == "$latest_ready_revision" \
                && "$active_revision_mode" == "Single" && "$traffic_ok" == "true" ]]; then
                revision_json="$(az containerapp revision show \
                  --name "$app" \
                  --resource-group "${AZURE_RESOURCE_GROUP}" \
                  --revision "$latest_revision" --output json)"
                revision_image="$(jq -r '.properties.template.containers[0].image // empty' <<<"$revision_json")"
                provisioning_state="$(jq -r '.properties.provisioningState // empty' <<<"$revision_json")"
                health_state="$(jq -r '.properties.healthState // empty' <<<"$revision_json")"
                running_state="$(jq -r '.properties.runningState // empty' <<<"$revision_json")"
                app_version="$(jq -r '
                  [.properties.template.containers[0].env[]?
                    | select(.name == "HINTERLAND_APP_VERSION") | .value][0] // empty
                ' <<<"$revision_json")"
                if [[ "$revision_image" == "$IMAGE" && "$provisioning_state" == "Provisioned" \
                  && "$health_state" == "Healthy" && "$running_state" == Running* \
                  && "$app_version" == "$GITHUB_SHA" ]]; then
                  ready_revision="$latest_revision"
                  break
                fi
              fi
              sleep 10
            done
            test -n "$ready_revision"
            printf '%s' "$ready_revision"
          }

          ready_revision="$(wait_for_exact_revision "${AZURE_CONTAINER_APP}")"
          fqdn="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn --output tsv)"
          echo "HINTERLAND_API_BASE_URL=https://${fqdn}" >> "$GITHUB_ENV"
          echo "W1_API_READY_REVISION=${ready_revision}" >> "$GITHUB_ENV"

          az containerapp update \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --set-env-vars \
              HINTERLAND_APP_VERSION="${GITHUB_SHA}" \
              HINTERLAND_MODERATION_PROVIDER=noop \
              HINTERLAND_INAT_CV_ENABLED=false \
              HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
              HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
              HINTERLAND_INAT_SUBMIT_ENABLED=false \
              HINTERLAND_ALLOW_STUB_AUTH=false \
              HINTERLAND_DEV_AUTH_ENABLED=false \
              HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
              HINTERLAND_GEOCODING_PROVIDER=noop \
              HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
              HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
            --output none
          rollback_ready_revision="$(wait_for_exact_revision \
            "${AZURE_ROLLBACK_CONTAINER_APP}")"
          rollback_fqdn="$(az containerapp show \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn --output tsv)"
          echo "W1_ROLLBACK_READY_REVISION=${rollback_ready_revision}" >> "$GITHUB_ENV"
          echo "W1_ROLLBACK_API_BASE_URL=https://${rollback_fqdn}" >> "$GITHUB_ENV"

          jq --arg revision "$ready_revision" \
            --arg rollback_revision "$rollback_ready_revision" \
            --arg version "$GITHUB_SHA" --arg image "$IMAGE" \
            '.api_rollout={revision:$revision, rollback_revision:$rollback_revision,
              version:$version, image:$image, primary_location:"centralus",
              rollback_location:"eastus"}' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

      - name: Apply and verify the W1 storage lifecycle
        run: |
          set -euo pipefail
          az storage account management-policy create \
            --account-name "${AZURE_STORAGE_ACCOUNT}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --policy @infra-azure/policies/observation-w1-lifecycle.json \
            --output none
          az storage account management-policy show \
            --account-name "${AZURE_STORAGE_ACCOUNT}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" --output json \
            > /tmp/lifecycle.json
          jq -e '
            [.policy.rules[] | select(.enabled == true) |
              {name, days:.definition.actions.baseBlob.delete.daysAfterModificationGreaterThan,
               prefixes:.definition.filters.prefixMatch}]
            | any(.name == "observation-unattached-upload-24h" and .days == 1)
              and any(.name == "observation-pilot-private-7d" and .days == 7)
              and any(.name == "observation-quarantine-rejected-90d" and .days == 90)
          ' /tmp/lifecycle.json >/dev/null

      - name: Smoke public readiness surfaces
        run: |
          set -euo pipefail
          test -n "${W1_API_READY_REVISION:-}"
          test -n "${W1_ROLLBACK_READY_REVISION:-}"
          test -n "${W1_ROLLBACK_API_BASE_URL:-}"

          primary_domain_count="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "length(properties.configuration.ingress.customDomains[?name=='api.thehinterlandguide.app'])" \
            --output tsv)"
          rollback_domain_count="$(az containerapp show \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "length(properties.configuration.ingress.customDomains[?name=='api.thehinterlandguide.app'])" \
            --output tsv)"
          test "$primary_domain_count" = 1
          test "$rollback_domain_count" = 1
          primary_static_ip="$(az containerapp env show \
            --name "${AZURE_CONTAINER_APP_ENV}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.staticIp --output tsv)"
          test -n "$primary_static_ip"
          test -z "$(dig +short CNAME api.thehinterlandguide.app)"
          mapfile -t public_ips < <(
            dig +short A api.thehinterlandguide.app | sort -u
          )
          test "${#public_ips[@]}" = 1
          public_ip="${public_ips[0]}"
          test "$public_ip" = "$primary_static_ip"
          jq --arg hostname "api.thehinterlandguide.app" \
            --arg public_ip "$public_ip" \
            --arg primary_static_ip "$primary_static_ip" \
            '.dns={hostname:$hostname, public_ip:$public_ip,
              primary_static_ip:$primary_static_ip}' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

          for base_url in \
            "${HINTERLAND_API_BASE_URL}" \
            "${W1_ROLLBACK_API_BASE_URL}" \
            "https://api.thehinterlandguide.app"; do
            health="$(curl --fail --silent --show-error "${base_url}/health")"
            ready="$(curl --fail --silent --show-error "${base_url}/ready")"
            jq -e --arg version "${GITHUB_SHA}" \
              '.status == "ok" and .version == $version' <<<"$health" >/dev/null
            jq -e --arg version "${GITHUB_SHA}" \
              '.status == "ready" and .version == $version' <<<"$ready" >/dev/null
            curl --fail --silent --show-error \
              "${base_url}${HINTERLAND_KID_JWKS_PATH}" >/dev/null
          done

      - name: Verify trusted parent browser CORS preflight
        run: |
          set -euo pipefail
          test -n "${HINTERLAND_API_BASE_URL:-}"
          api_surfaces=(
            "${HINTERLAND_API_BASE_URL}"
            "${W1_ROLLBACK_API_BASE_URL}"
            "https://api.thehinterlandguide.app"
          )
          trusted_origins=(
            "https://parents.thehinterlandguide.app"
            "https://purple-coast-088e6b30f.7.azurestaticapps.net"
          )
          response_headers="$(mktemp)"
          normalized_headers="$(mktemp)"
          trap 'rm -f "$response_headers" "$normalized_headers"' EXIT
          probe_count=0
          for base_url in "${api_surfaces[@]}"; do
            for origin in "${trusted_origins[@]}"; do
              : > "$response_headers"
              status="$(curl --silent --show-error --output /dev/null \
                --dump-header "$response_headers" \
                --request OPTIONS \
                --header "Origin: ${origin}" \
                --header "Access-Control-Request-Method: POST" \
                --header "Access-Control-Request-Headers: content-type" \
                --max-time 30 --write-out '%{http_code}' \
                "${base_url}/v1/auth/consent")"
              test "$status" = 200
              tr -d '\r' < "$response_headers" > "$normalized_headers"
              grep -Fxi "access-control-allow-origin: ${origin}" \
                "$normalized_headers" >/dev/null
              grep -Fxi "access-control-allow-credentials: true" \
                "$normalized_headers" >/dev/null
              methods="$(awk -F': *' \
                'tolower($1) == "access-control-allow-methods" {print toupper($2)}' \
                "$normalized_headers" | tail -n 1)"
              methods=",${methods// /},"
              [[ "$methods" == *,POST,* ]]
              headers="$(awk -F': *' \
                'tolower($1) == "access-control-allow-headers" {print tolower($2)}' \
                "$normalized_headers" | tail -n 1)"
              headers=",${headers// /},"
              [[ "$headers" == *,content-type,* ]]
              probe_count=$((probe_count + 1))
            done
          done
          test "$probe_count" = 6
          untrusted_origin="https://example.invalid"
          rejected_probe_count=0
          for base_url in "${api_surfaces[@]}"; do
            : > "$response_headers"
            status="$(curl --silent --show-error --output /dev/null \
              --dump-header "$response_headers" \
              --request OPTIONS \
              --header "Origin: ${untrusted_origin}" \
              --header "Access-Control-Request-Method: POST" \
              --header "Access-Control-Request-Headers: content-type" \
              --max-time 30 --write-out '%{http_code}' \
              "${base_url}/v1/auth/consent")"
            test "$status" = 400
            tr -d '\r' < "$response_headers" > "$normalized_headers"
            if grep -qi '^access-control-allow-origin:' "$normalized_headers"; then
              echo "Untrusted browser origin received API access" >&2
              exit 1
            fi
            rejected_probe_count=$((rejected_probe_count + 1))
          done
          test "$rejected_probe_count" = 3
          jq \
            --argjson trusted_origin_count "${#trusted_origins[@]}" \
            --argjson api_surface_count "${#api_surfaces[@]}" \
            --argjson probe_count "$probe_count" \
            --argjson rejected_probe_count "$rejected_probe_count" \
            '.cors_preflight={result:"passed", path:"/v1/auth/consent", method:"POST",
              trusted_origin_count:$trusted_origin_count,
              api_surface_count:$api_surface_count, probe_count:$probe_count,
              rejected_probe_count:$rejected_probe_count}' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

      - name: Non-skipped authenticated handoff and Observation canary
        env:
          HINTERLAND_SMOKE_ENTRA_BEARER: ${{ secrets.HINTERLAND_SMOKE_ENTRA_BEARER }}
          HINTERLAND_SMOKE_EVIDENCE_PATH: promotion-artifact/authenticated-smoke.json
          HINTERLAND_DISPATCHER_BENCHMARK_SAMPLES: "50"
        run: |
          set -euo pipefail
          test -n "${HINTERLAND_SMOKE_ENTRA_BEARER}"
          python - <<'PY'
          import base64
          import json
          import os
          import time

          token = os.environ["HINTERLAND_SMOKE_ENTRA_BEARER"]
          payload = token.split(".", 2)[1]
          payload += "=" * (-len(payload) % 4)
          expires_at = int(json.loads(base64.urlsafe_b64decode(payload))["exp"])
          if expires_at - int(time.time()) < 900:
              raise SystemExit(
                  "test-parent credential needs at least 900s for authenticated canaries"
              )
          PY
          python scripts/smoke_azure_parent_kid.py

      - name: Require exact-revision deployed dispatcher p95 below 300 ms
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          workspace_id="$(az monitor log-analytics workspace show \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --workspace-name hinterland-law-dev \
            --query customerId --output tsv)"
          test -n "$workspace_id"
          backend/.venv/bin/python scripts/verify_deployed_dispatcher_benchmark.py \
            --seed-evidence promotion-artifact/authenticated-smoke.json \
            --workspace-id "$workspace_id" \
            --expected-revision "$W1_API_READY_REVISION" \
            --expected-image "$IMAGE" \
            --threshold-ms 300 \
            --timeout-seconds 900 \
            --output promotion-artifact/dispatcher-benchmark.json
          jq --slurpfile benchmark promotion-artifact/dispatcher-benchmark.json \
            '.dispatcher_benchmark=$benchmark[0]' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

      - name: Strict post-canary database health
        run: |
          set -euo pipefail
          execution="$(az containerapp job start \
            --name hinterland-obs-health \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query name --output tsv)"
          status=""
          for _ in $(seq 1 60); do
            status="$(az containerapp job execution show \
              --name hinterland-obs-health \
              --job-execution-name "$execution" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query properties.status --output tsv)"
            case "$status" in
              Succeeded|Failed|Canceled) break ;;
            esac
            sleep 10
          done
          jq \
            --arg job hinterland-obs-health \
            --arg execution "$execution" --arg status "$status" \
            '. + [{job:$job, execution:$execution, status:$status}]' \
            promotion-artifact/job-executions.json > promotion-artifact/job-executions.tmp
          mv promotion-artifact/job-executions.tmp promotion-artifact/job-executions.json
          test "$status" = Succeeded

      - name: Provision, verify, and synthetically test required alerts
        env:
          HINTERLAND_ALERT_EMAIL: ${{ secrets.HINTERLAND_ALERT_EMAIL }}
          HINTERLAND_MONITORING_EVIDENCE_PATH: promotion-artifact/monitoring.json
        run: |
          set -euo pipefail
          bash infra-azure/observation-w1-monitoring.sh \
            --apply --verify --synthetic

      - name: Assert final W1 runtime, queue, and digest state
        run: |
          set -euo pipefail
          assert_env() {
            local kind="$1" name="$2" variable="$3" expected="$4" value
            if [[ "$kind" == app ]]; then
              value="$(az containerapp show --name "$name" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "properties.template.containers[0].env[?name=='${variable}'].value | [0]" \
                --output tsv)"
            else
              value="$(az containerapp job show --name "$name" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --query "properties.template.containers[0].env[?name=='${variable}'].value | [0]" \
                --output tsv)"
            fi
            test "$value" = "$expected"
          }
          uami_id="$(az identity show \
            --name "${AZURE_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          uami_client_id="$(az identity show \
            --name "${AZURE_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query clientId --output tsv)"
          rollback_uami_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query id --output tsv)"
          rollback_uami_client_id="$(az identity show \
            --name "${AZURE_ROLLBACK_UAMI_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query clientId --output tsv)"
          assert_only_runtime_identity() {
            local kind="$1" name="$2" expected_id="$3" identity
            if [[ "$kind" == app ]]; then
              identity="$(az containerapp show --name "$name" \
                --resource-group "${AZURE_RESOURCE_GROUP}" --query identity --output json)"
            else
              identity="$(az containerapp job show --name "$name" \
                --resource-group "${AZURE_RESOURCE_GROUP}" --query identity --output json)"
            fi
            jq -e --arg expected "${expected_id,,}" '
              .type == "UserAssigned"
              and ((.userAssignedIdentities // {}) | length == 1)
              and ([((.userAssignedIdentities // {}) | keys[]) | ascii_downcase]
                   | index($expected) != null)
            ' <<< "$identity" >/dev/null
          }

          api_image="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query 'properties.template.containers[0].image' --output tsv)"
          test "$api_image" = "$IMAGE"
          rollback_api_image="$(az containerapp show \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query 'properties.template.containers[0].image' --output tsv)"
          test "$rollback_api_image" = "$IMAGE"
          assert_only_runtime_identity app "${AZURE_CONTAINER_APP}" "$uami_id"
          assert_only_runtime_identity app "${AZURE_ROLLBACK_CONTAINER_APP}" \
            "$rollback_uami_id"
          assert_env app "${AZURE_CONTAINER_APP}" AZURE_CLIENT_ID "$uami_client_id"
          assert_env app "${AZURE_ROLLBACK_CONTAINER_APP}" AZURE_CLIENT_ID \
            "$rollback_uami_client_id"
          normalize_location() {
            tr '[:upper:]' '[:lower:]' | tr -d ' '
          }
          for app in "${AZURE_CONTAINER_APP}" "${AZURE_ROLLBACK_CONTAINER_APP}"; do
            for pair in \
              HINTERLAND_MODERATION_PROVIDER=noop \
              HINTERLAND_INAT_CV_ENABLED=false \
              HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
              HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
              HINTERLAND_INAT_SUBMIT_ENABLED=false \
              HINTERLAND_ALLOW_STUB_AUTH=false \
              HINTERLAND_DEV_AUTH_ENABLED=false \
              HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
              HINTERLAND_GEOCODING_PROVIDER=noop \
              HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
              HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true; do
              assert_env app "$app" "${pair%%=*}" "${pair#*=}"
            done
            api_token_count="$(az containerapp show \
              --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "length(properties.template.containers[0].env[?name=='HINTERLAND_INAT_OAUTH_TOKEN'])" \
              --output tsv)"
            test "$api_token_count" = 0
          done
          primary_location="$(az containerapp show --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" --query location --output tsv | \
            normalize_location)"
          rollback_location="$(az containerapp show --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" --query location --output tsv | \
            normalize_location)"
          test "$primary_location" = "${AZURE_API_LOCATION_EXPECTED}"
          test "$rollback_location" = "${AZURE_JOB_LOCATION_EXPECTED}"

          mapfile -t jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for job in "${jobs[@]}"; do
            assert_only_runtime_identity job "$job" "$rollback_uami_id"
            assert_env job "$job" AZURE_CLIENT_ID "$rollback_uami_client_id"
            job_json="$(az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            image="$(jq -r '.properties.template.containers[0].image // empty' <<<"$job_json")"
            test "$image" = "$IMAGE"
            job_location="$(jq -r '.location // empty' <<<"$job_json" | normalize_location)"
            job_environment="$(jq -r '.properties.environmentId // empty' <<<"$job_json")"
            test "$job_location" = "${AZURE_JOB_LOCATION_EXPECTED}"
            test "${job_environment##*/}" = "${AZURE_ROLLBACK_CONTAINER_APP_ENV}"
            password_ref="$(az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "properties.template.containers[0].env[?name=='HINTERLAND_DATABASE_PASSWORD'].secretRef | [0]" \
              --output tsv)"
            test "$password_ref" = pg-password
            token_count="$(az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "length(properties.template.containers[0].env[?name=='HINTERLAND_INAT_OAUTH_TOKEN'])" \
              --output tsv)"
            test "$token_count" = 0
            for pair in \
              HINTERLAND_MODERATION_PROVIDER=noop \
              HINTERLAND_INAT_CV_ENABLED=false \
              HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
              HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
              HINTERLAND_INAT_SUBMIT_ENABLED=false \
              HINTERLAND_ALLOW_STUB_AUTH=false \
              HINTERLAND_DEV_AUTH_ENABLED=false \
              HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
              HINTERLAND_GEOCODING_PROVIDER=noop \
              HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
              HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true; do
              assert_env job "$job" "${pair%%=*}" "${pair#*=}"
            done
          done
          assert_env job hinterland-obs-health \
            HINTERLAND_OBSERVATION_HEALTH_FAIL_UNHEALTHY true
          assert_env job hinterland-state-rebuild \
            HINTERLAND_DERIVED_REBUILD_STRICT_DRAIN true

          queue_json="$(az servicebus queue show \
            --namespace-name "${SERVICE_BUS_NAMESPACE}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --name "${MODERATION_QUEUE}" --output json)"
          active="$(jq -r '.countDetails.activeMessageCount // 0' <<< "$queue_json")"
          deadletter="$(jq -r '.countDetails.deadLetterMessageCount // 0' <<< "$queue_json")"
          test "$active" = 0
          test "$deadletter" = 0

          revision="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.latestReadyRevisionName --output tsv)"
          rollback_revision="$(az containerapp show \
            --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.latestReadyRevisionName --output tsv)"
          jq \
            --arg image "$IMAGE" --arg digest "$IMAGE_DIGEST" \
            --arg revision "$revision" --arg alembic_head "$ALEMBIC_HEAD" \
            --arg rollback_revision "$rollback_revision" \
            --argjson job_count "${#jobs[@]}" \
            --argjson moderation_active "$active" \
            --argjson moderation_deadletter "$deadletter" \
            '.deployment={image:$image, digest:$digest, api_revision:$revision,
              rollback_api_revision:$rollback_revision,
              api_location:"centralus", rollback_location:"eastus",
              job_location:"eastus", alembic_head:$alembic_head,
              job_count:$job_count}
             | .queues={moderation_active:$moderation_active,
                moderation_deadletter:$moderation_deadletter}' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json

      - name: Restore temporary strict job modes
        if: always()
        run: |
          set -euo pipefail
          if ! az account show --output none >/dev/null 2>&1; then
            exit 0
          fi
          remove_if_present() {
            local job="$1" variable="$2" count
            if ! az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output none >/dev/null 2>&1; then
              return
            fi
            count="$(az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "length(properties.template.containers[0].env[?name=='${variable}'])" \
              --output tsv)"
            if [[ "$count" != 0 ]]; then
              az containerapp job update --name "$job" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --remove-env-vars "$variable" --output none
            fi
          }
          remove_if_present hinterland-obs-health \
            HINTERLAND_OBSERVATION_HEALTH_FAIL_UNHEALTHY
          remove_if_present hinterland-state-rebuild \
            HINTERLAND_DERIVED_REBUILD_STRICT_DRAIN
          remove_if_present hinterland-state-rebuild \
            HINTERLAND_DERIVED_REBUILD_MAX_PASSES

      - name: Recheck exact W1 web deployments before final evidence
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from urllib.request import urlopen

          expected = os.environ["GITHUB_SHA"]
          targets = [
              ("parents", "https://parents.thehinterlandguide.app"),
              ("landing", "https://thehinterlandguide.app"),
              ("landing", "https://www.thehinterlandguide.app"),
          ]
          for surface, base_url in targets:
              last_error = "no response"
              for _ in range(6):
                  try:
                      with urlopen(
                          f"{base_url}/.well-known/hinterland-build.json?sha={expected}",
                          timeout=15,
                      ) as response:
                          payload = json.load(response)
                      if payload == {"surface": surface, "commit_sha": expected}:
                          break
                      last_error = f"unexpected marker: {payload!r}"
                  except Exception as exc:  # noqa: BLE001 - bounded promotion probe
                      last_error = str(exc)
                  time.sleep(5)
              else:
                  raise SystemExit(
                      f"{base_url} changed during promotion: {last_error}"
                  )
          PY

      - name: Recheck parent callback route before final evidence
        run: |
          set -euo pipefail
          python scripts/verify_parent_callback.py \
            --expected-sha "${GITHUB_SHA}" \
            --origin "azure_swa=https://purple-coast-088e6b30f.7.azurestaticapps.net" \
            --origin "public_parent=https://parents.thehinterlandguide.app" \
            --evidence-path promotion-artifact/parent-callback-final.json

      - name: Finalize sanitized evidence
        if: always()
        env:
          JOB_RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          test -f promotion-artifact/promotion.json || {
            mkdir -p promotion-artifact
            jq -n --arg result "$JOB_RESULT" \
              --arg commit_sha "$GITHUB_SHA" \
              '{schema_version:1, commit_sha:$commit_sha, result:$result}' \
              > promotion-artifact/promotion.json
          }
          jq --arg result "$JOB_RESULT" '.result=$result' \
            promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
          mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          if [[ -f promotion-artifact/job-executions.json ]]; then
            jq --slurpfile jobs promotion-artifact/job-executions.json \
              '.job_executions=$jobs[0]' \
              promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
            mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          fi
          if [[ -f promotion-artifact/authenticated-smoke.json ]]; then
            jq --slurpfile smoke promotion-artifact/authenticated-smoke.json \
              '.authenticated_smoke=($smoke[0] |
                if .dispatcher_benchmark then
                  .dispatcher_benchmark |= del(.observation_ids)
                else . end)' \
              promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
            mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          fi
          # The verifier writes aggregate evidence before returning its
          # fail-closed exit code. Preserve those timings/reasons even when the
          # benchmark step failed and its inline merge never ran.
          if [[ -f promotion-artifact/dispatcher-benchmark.json ]]; then
            jq --slurpfile benchmark promotion-artifact/dispatcher-benchmark.json \
              '.dispatcher_benchmark=$benchmark[0]' \
              promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
            mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          fi
          if [[ -f promotion-artifact/monitoring.json ]]; then
            jq --slurpfile monitoring promotion-artifact/monitoring.json \
              '.monitoring=$monitoring[0]' \
              promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
            mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          fi
          if [[ -f promotion-artifact/parent-callback-initial.json ]]; then
            jq --slurpfile callback promotion-artifact/parent-callback-initial.json \
              '.parent_callback_initial=$callback[0]' \
              promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
            mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          fi
          if [[ -f promotion-artifact/parent-callback-final.json ]]; then
            jq --slurpfile callback promotion-artifact/parent-callback-final.json \
              '.parent_callback_final=$callback[0]' \
              promotion-artifact/promotion.json > promotion-artifact/promotion.tmp
            mv promotion-artifact/promotion.tmp promotion-artifact/promotion.json
          fi

      - name: Publish promotion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observation-w1-promotion-${{ github.run_id }}
          path: promotion-artifact/promotion.json
          if-no-files-found: error
          retention-days: 30
