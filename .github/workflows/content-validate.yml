name: Validate expedition content

# Fast, focused workflow that runs only when content or its validator changes.
# A broken expedition fails here and never merges. See docs/expedition-authoring.md.

on:
  pull_request:
    paths:
      - "content/**"
      - "backend/app/models/expedition.py"
      - "scripts/validate_content.py"
      - "scripts/regenerate_schema.py"
  push:
    paths:
      - "content/**"
      - "backend/app/models/expedition.py"
      - "scripts/validate_content.py"
      - "scripts/regenerate_schema.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Validate expedition JSON
        working-directory: backend
        run: uv run python ../scripts/validate_content.py

      - name: Confirm JSON schema is up to date
        # regenerate_schema.py is idempotent; if the committed schema
        # doesn't match the Pydantic model, the diff catches it.
        # The schema lives at the repo root under content/schema/, so
        # run the diff from there. The script itself is invoked via
        # `cd backend` so uv resolves the right venv.
        run: |
          (cd backend && uv run python ../scripts/regenerate_schema.py)
          git diff --exit-code content/schema/expedition.schema.json || (
            echo "::error::content/schema/expedition.schema.json is out of date. Run scripts/regenerate_schema.py and commit."
            exit 1
          )
