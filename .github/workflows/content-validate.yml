name: Validate expedition and sanctuary content

# Fast, focused workflow that runs only when content or its validator changes.
# A broken expedition or sanctuary file fails here and never merges.
# See docs/expedition-authoring.md and docs/sanctuary.md.

on:
  pull_request:
    paths:
      - "content/**"
      - "content/sanctuary/**"
      - "backend/app/models/expedition.py"
      - "backend/app/models/sanctuary.py"
      - "scripts/validate_content.py"
      - "scripts/validate_taxonomy.py"
      - "backend/admin/taxa_catalog_ingest.py"
      - "scripts/regenerate_schema.py"
  push:
    paths:
      - "content/**"
      - "content/sanctuary/**"
      - "backend/app/models/expedition.py"
      - "backend/app/models/sanctuary.py"
      - "scripts/validate_content.py"
      - "scripts/validate_taxonomy.py"
      - "backend/admin/taxa_catalog_ingest.py"
      - "scripts/regenerate_schema.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Validate expedition + sanctuary JSON
        working-directory: backend
        run: uv run python ../scripts/validate_content.py

      - name: Validate taxonomy packs and manifests
        working-directory: backend
        run: uv run python ../scripts/validate_taxonomy.py

      - name: Confirm JSON schemas are up to date
        # regenerate_schema.py is idempotent; if a committed schema
        # doesn't match its Pydantic model, the diff catches it.
        # The schemas live at the repo root under content/schema/, so
        # run the diff from there. The script itself is invoked via
        # `cd backend` so uv resolves the right venv.
        run: |
          (cd backend && uv run python ../scripts/regenerate_schema.py)
          git diff --exit-code content/schema/ || (
            echo "::error::content/schema/ is out of date. Run scripts/regenerate_schema.py and commit."
            exit 1
          )
