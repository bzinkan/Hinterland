name: Deploy Cloud Run dev

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-cloud-run-dev.yml"
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-dev
  cancel-in-progress: false

env:
  PROJECT_ID: dragonflyapp-495423
  REGION: us-central1
  ARTIFACT_REPOSITORY: dragonfly
  SERVICE: dragonfly-api

jobs:
  deploy:
    name: Build, deploy, smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/dragonfly-api:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
          gcloud builds submit backend --tag "${IMAGE}" --project "${PROJECT_ID}"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --quiet

      - name: Smoke probes
        run: |
          URL="$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format='value(status.url)')"
          TOKEN="$(gcloud auth print-identity-token --audiences="${URL}")"
          curl --fail --silent --show-error -H "Authorization: Bearer ${TOKEN}" "${URL}/health"
          curl --fail --silent --show-error -H "Authorization: Bearer ${TOKEN}" "${URL}/ready"
          curl --fail --silent --show-error -H "Authorization: Bearer ${TOKEN}" "${URL}/v1/meta"
