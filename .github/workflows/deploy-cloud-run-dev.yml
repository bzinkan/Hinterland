name: Deploy Cloud Run dev

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-cloud-run-dev.yml"
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-dev
  cancel-in-progress: false

env:
  PROJECT_ID: dragonflyapp-495423
  REGION: us-central1
  ARTIFACT_REPOSITORY: dragonfly
  SERVICE: dragonfly-api
  RUNTIME_SERVICE_ACCOUNT: dragonfly-api-dev@dragonflyapp-495423.iam.gserviceaccount.com
  CLOUDBUILD_SOURCE_BUCKET: dragonfly-build-source-dev-dragonflyapp-495423

jobs:
  deploy:
    name: Build, deploy, smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/dragonfly-api:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
          BUILD_ID="$(gcloud builds submit backend \
            --tag "${IMAGE}" \
            --gcs-source-staging-dir "gs://${CLOUDBUILD_SOURCE_BUCKET}/source" \
            --suppress-logs \
            --async \
            --format='value(id)' \
            --project "${PROJECT_ID}")"
          echo "Cloud Build ${BUILD_ID}"
          for attempt in {1..120}; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project "${PROJECT_ID}" \
              --format='value(status)')"
            case "${STATUS}" in
              SUCCESS)
                exit 0
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Cloud Build ${BUILD_ID} ended with ${STATUS}"
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "Cloud Build ${BUILD_ID} did not finish before timeout"
          exit 1

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --service-account "${RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --quiet

      - name: Smoke probes
        run: |
          URL="$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format='value(status.url)')"
          curl --fail --silent --show-error "${URL}/health"
          curl --fail --silent --show-error "${URL}/ready"
          curl --fail --silent --show-error "${URL}/v1/meta"
