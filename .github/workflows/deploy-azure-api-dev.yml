name: Deploy Hinterland API dev

on:
  workflow_dispatch:

concurrency:
  group: deploy-hinterland-api-dev
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: hinterland-dev-rg
  AZURE_ACR_NAME: hinterlandacrdev
  AZURE_CONTAINER_APP: hinterland-api-central
  AZURE_CONTAINER_APP_ENV: hinterland-cae-central-dev
  AZURE_CONTAINER_APP_UAMI: hinterland-api-central-mi
  AZURE_ROLLBACK_CONTAINER_APP: hinterland-api
  AZURE_ROLLBACK_CONTAINER_APP_ENV: hinterland-cae-dev
  AZURE_ROLLBACK_CONTAINER_APP_UAMI: hinterland-api-mi
  AZURE_API_LOCATION_EXPECTED: centralus
  AZURE_JOB_LOCATION_EXPECTED: eastus
  IMAGE_REPOSITORY: hinterland-api
  ENTRA_API_AUDIENCE: 7dd9da3c-b7d6-45d4-955b-d7561c43f209
  HINTERLAND_KID_JWKS_PATH: /.well-known/hinterland-kid-jwks.json

jobs:
  deploy:
    name: Build, migrate, deploy, smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Require split API and job placement
        run: |
          set -euo pipefail
          normalize_location() {
            tr '[:upper:]' '[:lower:]' | tr -d ' '
          }
          assert_app_placement() {
            local app="$1" expected_location="$2" expected_environment="$3"
            local app_json location environment
            app_json="$(az containerapp show --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            location="$(jq -r '.location // empty' <<<"$app_json" | normalize_location)"
            environment="$(jq -r '.properties.environmentId // empty' <<<"$app_json")"
            test "$location" = "$expected_location"
            test "${environment##*/}" = "$expected_environment"
          }
          assert_app_placement "${AZURE_CONTAINER_APP}" \
            "${AZURE_API_LOCATION_EXPECTED}" "${AZURE_CONTAINER_APP_ENV}"
          assert_app_placement "${AZURE_ROLLBACK_CONTAINER_APP}" \
            "${AZURE_JOB_LOCATION_EXPECTED}" "${AZURE_ROLLBACK_CONTAINER_APP_ENV}"

          mapfile -t jobs < <(az containerapp job list \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          test "${#jobs[@]}" -gt 0
          for job in "${jobs[@]}"; do
            job_json="$(az containerapp job show --name "$job" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            location="$(jq -r '.location // empty' <<<"$job_json" | normalize_location)"
            environment="$(jq -r '.properties.environmentId // empty' <<<"$job_json")"
            test "$location" = "${AZURE_JOB_LOCATION_EXPECTED}"
            test "${environment##*/}" = "${AZURE_ROLLBACK_CONTAINER_APP_ENV}"
          done

      - name: Build image in Azure Container Registry
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER="$(az acr show --name "${AZURE_ACR_NAME}" --resource-group "${AZURE_RESOURCE_GROUP}" --query loginServer --output tsv)"
          az acr build \
            --registry "${AZURE_ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --image "${IMAGE_REPOSITORY}:latest" \
            --file backend/Dockerfile \
            .
          DIGEST="$(az acr repository show --name "${AZURE_ACR_NAME}" --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" --query digest --output tsv)"
          IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}@${DIGEST}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Retire obsolete recovery jobs
        run: |
          set -euo pipefail
          mapfile -t retired_jobs < <(az containerapp job list --resource-group "${AZURE_RESOURCE_GROUP}" --query "[?contains(name, 'legacy')].name" --output tsv)
          for job in "${retired_jobs[@]}"; do
            test -n "${job}" || continue
            az containerapp job delete --name "${job}" --resource-group "${AZURE_RESOURCE_GROUP}" --yes --output none
          done

      - name: Pin only preflight and migration jobs to this image
        run: |
          set -euo pipefail
          jobs=(hinterland-obs-preflight hinterland-migrate)
          for job in "${jobs[@]}"; do
            az containerapp job update \
              --name "${job}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE}" \
              --output none
          done

      - name: Seed preflight and migration job settings
        run: |
          set -euo pipefail
          mapfile -t shared_env < <(
            az containerapp show --name "${AZURE_CONTAINER_APP}" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query 'properties.template.containers[0].env[?starts_with(name, `HINTERLAND_`)]' --output json |
              jq -r '
                .[] |
                select(.name != "HINTERLAND_APP_VERSION") |
                select(.name != "HINTERLAND_DEV_AUTH_ENABLED") |
                select(.name != "HINTERLAND_DEV_AUTH_TOKEN") |
                select(.name != "HINTERLAND_ENTRA_API_AUDIENCE") |
                select(.secretRef | not) |
                select(.value != null) |
                "\(.name)=\(.value)"
              '
          )
          test "${#shared_env[@]}" -gt 0
          jobs=(hinterland-obs-preflight hinterland-migrate)
          for job in "${jobs[@]}"; do
            secret_names="$(az containerapp job secret list --name "${job}" --resource-group "${AZURE_RESOURCE_GROUP}" --query '[].name' --output tsv)"
            grep -qx 'pg-password' <<< "${secret_names}"
            az containerapp job update \
              --name "${job}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --set-env-vars \
                "${shared_env[@]}" \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_DATABASE_PASSWORD=secretref:pg-password \
              --output none
          done

      - name: Remove retired runtime variable aliases
        run: |
          set -euo pipefail
          retired_name="$(printf '\144\162\141\147\157\156\146\154\171')"
          remove_aliases() {
            local resource_kind="$1"
            local resource_name="$2"
            local env_names
            if [ "${resource_kind}" = "app" ]; then
              env_names="$(az containerapp show --name "${resource_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query 'properties.template.containers[0].env[].name' --output tsv)"
            else
              env_names="$(az containerapp job show --name "${resource_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --query 'properties.template.containers[0].env[].name' --output tsv)"
            fi
            mapfile -t aliases < <(grep -i "^${retired_name}_" <<< "${env_names}" || true)
            if [ "${#aliases[@]}" -gt 0 ]; then
              if [ "${resource_kind}" = "app" ]; then
                az containerapp update --name "${resource_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --remove-env-vars "${aliases[@]}" --output none
              else
                az containerapp job update --name "${resource_name}" --resource-group "${AZURE_RESOURCE_GROUP}" --remove-env-vars "${aliases[@]}" --output none
              fi
            fi
          }
          remove_aliases app "${AZURE_CONTAINER_APP}"
          remove_aliases app "${AZURE_ROLLBACK_CONTAINER_APP}"
          mapfile -t jobs < <(az containerapp job list --resource-group "${AZURE_RESOURCE_GROUP}" --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for job in "${jobs[@]}"; do
            remove_aliases job "${job}"
          done

      - name: Run preflight and additive migrations first
        run: |
          set -euo pipefail
          run_job() {
            local job="$1"
            local execution
            execution="$(az containerapp job start --name "${job}" --resource-group "${AZURE_RESOURCE_GROUP}" --query name --output tsv)"
            for attempt in $(seq 1 60); do
              status="$(az containerapp job execution show --name "${job}" --job-execution-name "${execution}" --resource-group "${AZURE_RESOURCE_GROUP}" --query properties.status --output tsv)"
              case "${status}" in
                Succeeded) return 0 ;;
                Failed|Canceled) echo "${job} failed." >&2; return 1 ;;
              esac
              sleep 10
            done
            echo "${job} timed out." >&2
            return 1
          }
          run_job hinterland-obs-preflight
          run_job hinterland-migrate

      - name: Pin all Hinterland jobs after migration success
        run: |
          set -euo pipefail
          mapfile -t jobs < <(az containerapp job list --resource-group "${AZURE_RESOURCE_GROUP}" --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          test "${#jobs[@]}" -gt 0
          for job in "${jobs[@]}"; do
            az containerapp job update \
              --name "${job}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE}" \
              --output none
          done

      - name: Seed all Hinterland job settings after migration success
        run: |
          set -euo pipefail
          mapfile -t shared_env < <(
            az containerapp show --name "${AZURE_CONTAINER_APP}" --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query 'properties.template.containers[0].env[?starts_with(name, `HINTERLAND_`)]' --output json |
              jq -r '
                .[] |
                select(.name != "HINTERLAND_APP_VERSION") |
                select(.name != "HINTERLAND_DEV_AUTH_ENABLED") |
                select(.name != "HINTERLAND_DEV_AUTH_TOKEN") |
                select(.name != "HINTERLAND_ENTRA_API_AUDIENCE") |
                select(.secretRef | not) |
                select(.value != null) |
                "\(.name)=\(.value)"
              '
          )
          test "${#shared_env[@]}" -gt 0
          mapfile -t jobs < <(az containerapp job list --resource-group "${AZURE_RESOURCE_GROUP}" --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for job in "${jobs[@]}"; do
            secret_names="$(az containerapp job secret list --name "${job}" --resource-group "${AZURE_RESOURCE_GROUP}" --query '[].name' --output tsv)"
            grep -qx 'pg-password' <<< "${secret_names}"
            az containerapp job update \
              --name "${job}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --set-env-vars \
                "${shared_env[@]}" \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_DATABASE_PASSWORD=secretref:pg-password \
              --output none
          done

      - name: Run taxonomy and Expedition content jobs
        run: |
          set -euo pipefail
          run_job() {
            local job="$1"
            local execution
            execution="$(az containerapp job start --name "${job}" --resource-group "${AZURE_RESOURCE_GROUP}" --query name --output tsv)"
            for attempt in $(seq 1 60); do
              status="$(az containerapp job execution show --name "${job}" --job-execution-name "${execution}" --resource-group "${AZURE_RESOURCE_GROUP}" --query properties.status --output tsv)"
              case "${status}" in
                Succeeded) return 0 ;;
                Failed|Canceled) echo "${job} failed." >&2; return 1 ;;
              esac
              sleep 10
            done
            echo "${job} timed out." >&2
            return 1
          }
          run_job hinterland-taxa-catalog-ingest
          run_job hinterland-sync-expeditions

      - name: Rebuild derived state
        run: |
          set -euo pipefail
          run_job() {
            local job="$1"
            local execution
            execution="$(az containerapp job start --name "${job}" --resource-group "${AZURE_RESOURCE_GROUP}" --query name --output tsv)"
            for attempt in $(seq 1 60); do
              status="$(az containerapp job execution show --name "${job}" --job-execution-name "${execution}" --resource-group "${AZURE_RESOURCE_GROUP}" --query properties.status --output tsv)"
              case "${status}" in
                Succeeded) return 0 ;;
                Failed|Canceled) echo "${job} failed." >&2; return 1 ;;
              esac
              sleep 10
            done
            echo "${job} timed out." >&2
            return 1
          }
          run_job hinterland-state-rebuild

      - name: Deploy Central API then East rollback revision
        run: |
          set -euo pipefail
          update_app() {
            local app="$1" env_names
            local -a forbidden_vars=()
            env_names="$(az containerapp show --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query 'properties.template.containers[0].env[].name' --output tsv)"
            for variable in HINTERLAND_DEV_AUTH_TOKEN HINTERLAND_INAT_OAUTH_TOKEN; do
              if grep -Fxq "$variable" <<<"$env_names"; then
                forbidden_vars+=("$variable")
              fi
            done
            if [[ "${#forbidden_vars[@]}" -gt 0 ]]; then
              az containerapp update \
                --name "$app" \
                --resource-group "${AZURE_RESOURCE_GROUP}" \
                --remove-env-vars "${forbidden_vars[@]}" \
                --output none
            fi
            az containerapp update \
              --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE}" \
              --set-env-vars \
                HINTERLAND_APP_VERSION="${GITHUB_SHA}" \
                HINTERLAND_MODERATION_PROVIDER=noop \
                HINTERLAND_INAT_CV_ENABLED=false \
                HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
                HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
                HINTERLAND_INAT_SUBMIT_ENABLED=false \
                HINTERLAND_ALLOW_STUB_AUTH=false \
                HINTERLAND_DEV_AUTH_ENABLED=false \
                HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
                HINTERLAND_GEOCODING_PROVIDER=noop \
                HINTERLAND_ENTRA_API_AUDIENCE="${ENTRA_API_AUDIENCE}" \
                HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true \
              --output none
          }
          wait_for_exact_revision() {
            local app="$1" deadline=$((SECONDS + 600))
            local app_json latest latest_ready mode traffic_ok revision_json
            local revision_image app_version
            while (( SECONDS < deadline )); do
              app_json="$(az containerapp show --name "$app" \
                --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
              latest="$(jq -r '.properties.latestRevisionName // empty' <<<"$app_json")"
              latest_ready="$(jq -r '.properties.latestReadyRevisionName // empty' <<<"$app_json")"
              mode="$(jq -r '.properties.configuration.activeRevisionsMode // empty' <<<"$app_json")"
              traffic_ok="$(jq -r '
                if .properties.configuration.ingress.traffic
                   | any(.latestRevision == true and .weight == 100)
                then "true" else "false" end
              ' <<<"$app_json")"
              if [[ -n "$latest" && "$latest" == "$latest_ready" \
                && "$mode" == "Single" && "$traffic_ok" == "true" ]]; then
                revision_json="$(az containerapp revision show --name "$app" \
                  --resource-group "${AZURE_RESOURCE_GROUP}" \
                  --revision "$latest" --output json)"
                revision_image="$(jq -r '.properties.template.containers[0].image // empty' \
                  <<<"$revision_json")"
                app_version="$(jq -r '
                  [.properties.template.containers[0].env[]?
                    | select(.name == "HINTERLAND_APP_VERSION") | .value][0] // empty
                ' <<<"$revision_json")"
                if [[ "$revision_image" == "$IMAGE" && "$app_version" == "$GITHUB_SHA" \
                  && "$(jq -r '.properties.provisioningState // empty' <<<"$revision_json")" == "Provisioned" \
                  && "$(jq -r '.properties.healthState // empty' <<<"$revision_json")" == "Healthy" \
                  && "$(jq -r '.properties.runningState // empty' <<<"$revision_json")" == Running* ]]; then
                  printf '%s' "$latest"
                  return 0
                fi
              fi
              sleep 10
            done
            echo "${app} did not reach its exact healthy revision" >&2
            return 1
          }

          update_app "${AZURE_CONTAINER_APP}"
          PRIMARY_API_READY_REVISION="$(wait_for_exact_revision "${AZURE_CONTAINER_APP}")"
          test -n "$PRIMARY_API_READY_REVISION"
          echo "PRIMARY_API_READY_REVISION=${PRIMARY_API_READY_REVISION}" >> "${GITHUB_ENV}"

          update_app "${AZURE_ROLLBACK_CONTAINER_APP}"
          ROLLBACK_API_READY_REVISION="$(wait_for_exact_revision "${AZURE_ROLLBACK_CONTAINER_APP}")"
          test -n "$ROLLBACK_API_READY_REVISION"
          echo "ROLLBACK_API_READY_REVISION=${ROLLBACK_API_READY_REVISION}" >> "${GITHUB_ENV}"

      - name: Smoke public API surfaces
        run: |
          set -euo pipefail
          PRIMARY_FQDN="$(az containerapp show --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn --output tsv)"
          ROLLBACK_FQDN="$(az containerapp show --name "${AZURE_ROLLBACK_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn --output tsv)"
          API_BASE_URL="https://${PRIMARY_FQDN}"
          echo "HINTERLAND_API_BASE_URL=${API_BASE_URL}" >> "${GITHUB_ENV}"
          for base_url in \
            "${API_BASE_URL}" \
            "https://${ROLLBACK_FQDN}" \
            "https://api.thehinterlandguide.app"; do
            health="$(curl --fail --silent --show-error "${base_url}/health")"
            ready="$(curl --fail --silent --show-error "${base_url}/ready")"
            jq -e --arg version "${GITHUB_SHA}" \
              '.status == "ok" and .version == $version' <<<"$health" >/dev/null
            jq -e --arg version "${GITHUB_SHA}" \
              '.status == "ready" and .version == $version' <<<"$ready" >/dev/null
            curl --fail --silent --show-error "${base_url}${HINTERLAND_KID_JWKS_PATH}"
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Install authenticated smoke dependencies
        working-directory: backend
        run: |
          uv sync --frozen --no-dev
          echo "${GITHUB_WORKSPACE}/backend/.venv/bin" >> "${GITHUB_PATH}"

      - name: Authenticated parent and kid smoke
        env:
          HINTERLAND_SMOKE_ENTRA_BEARER: ${{ secrets.HINTERLAND_SMOKE_ENTRA_BEARER }}
        run: |
          set -euo pipefail
          if [ -z "${HINTERLAND_SMOKE_ENTRA_BEARER:-}" ]; then
            echo "Parent smoke token is not configured; skipping."
            exit 0
          fi
          python scripts/smoke_azure_parent_kid.py

      - name: Verify deployed naming and image
        run: |
          set -euo pipefail
          retired_name="$(printf '\144\162\141\147\157\156\146\154\171')"
          normalize_location() {
            tr '[:upper:]' '[:lower:]' | tr -d ' '
          }
          assert_app() {
            local app="$1" expected_location="$2" expected_environment="$3" expected_uami="$4"
            local app_json image env_names audience location environment uami_id
            local pair actual forbidden
            app_json="$(az containerapp show --name "$app" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            image="$(jq -r '.properties.template.containers[0].image // empty' <<<"$app_json")"
            test "$image" = "$IMAGE"
            env_names="$(jq -r '.properties.template.containers[0].env[].name' <<<"$app_json")"
            ! grep -qi "${retired_name}" <<<"$env_names"
            audience="$(jq -r '
              [.properties.template.containers[0].env[]
                | select(.name == "HINTERLAND_ENTRA_API_AUDIENCE")
                | .value][0] // empty
            ' <<<"$app_json")"
            test "$audience" = "${ENTRA_API_AUDIENCE}"
            for pair in \
              HINTERLAND_MODERATION_PROVIDER=noop \
              HINTERLAND_INAT_CV_ENABLED=false \
              HINTERLAND_INAT_CV_DISCLOSURE_APPROVED=false \
              HINTERLAND_INAT_CV_BENCHMARK_APPROVED=false \
              HINTERLAND_INAT_SUBMIT_ENABLED=false \
              HINTERLAND_ALLOW_STUB_AUTH=false \
              HINTERLAND_DEV_AUTH_ENABLED=false \
              HINTERLAND_ORGANISM_FALLBACK_PROVIDER=noop \
              HINTERLAND_GEOCODING_PROVIDER=noop \
              HINTERLAND_OBSERVATION_IDEMPOTENCY_REQUIRED=true; do
              actual="$(jq -r --arg name "${pair%%=*}" '
                [.properties.template.containers[0].env[]
                  | select(.name == $name) | .value][0] // empty
              ' <<<"$app_json")"
              test "$actual" = "${pair#*=}"
            done
            for forbidden in HINTERLAND_DEV_AUTH_TOKEN HINTERLAND_INAT_OAUTH_TOKEN; do
              test "$(jq -r --arg name "$forbidden" '
                [.properties.template.containers[0].env[]
                  | select(.name == $name)] | length
              ' <<<"$app_json")" = 0
            done
            location="$(jq -r '.location // empty' <<<"$app_json" | normalize_location)"
            environment="$(jq -r '.properties.environmentId // empty' <<<"$app_json")"
            test "$location" = "$expected_location"
            test "${environment##*/}" = "$expected_environment"
            uami_id="$(az identity show --name "$expected_uami" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --query id --output tsv)"
            jq -e --arg expected "${uami_id,,}" '
              .identity.type == "UserAssigned"
              and ((.identity.userAssignedIdentities // {}) | length == 1)
              and ([((.identity.userAssignedIdentities // {}) | keys[]) | ascii_downcase]
                   | index($expected) != null)
            ' <<<"$app_json" >/dev/null
          }
          assert_app "${AZURE_CONTAINER_APP}" "${AZURE_API_LOCATION_EXPECTED}" \
            "${AZURE_CONTAINER_APP_ENV}" "${AZURE_CONTAINER_APP_UAMI}"
          assert_app "${AZURE_ROLLBACK_CONTAINER_APP}" "${AZURE_JOB_LOCATION_EXPECTED}" \
            "${AZURE_ROLLBACK_CONTAINER_APP_ENV}" "${AZURE_ROLLBACK_CONTAINER_APP_UAMI}"

          mapfile -t jobs < <(az containerapp job list --resource-group "${AZURE_RESOURCE_GROUP}" --query "[?starts_with(name, 'hinterland-')].name" --output tsv)
          for job in "${jobs[@]}"; do
            job_json="$(az containerapp job show --name "${job}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" --output json)"
            image="$(jq -r '.properties.template.containers[0].image // empty' <<<"$job_json")"
            test "${image}" = "${IMAGE}"
            env_names="$(jq -r '.properties.template.containers[0].env[].name' <<<"$job_json")"
            ! grep -qi "${retired_name}" <<< "${env_names}"
            job_audience="$(jq -r '
              [.properties.template.containers[0].env[]
                | select(.name == "HINTERLAND_ENTRA_API_AUDIENCE")
                | .value][0] // empty
            ' <<<"$job_json")"
            test "${job_audience}" = "${ENTRA_API_AUDIENCE}"
            location="$(jq -r '.location // empty' <<<"$job_json" | normalize_location)"
            environment="$(jq -r '.properties.environmentId // empty' <<<"$job_json")"
            test "$location" = "${AZURE_JOB_LOCATION_EXPECTED}"
            test "${environment##*/}" = "${AZURE_ROLLBACK_CONTAINER_APP_ENV}"
          done
